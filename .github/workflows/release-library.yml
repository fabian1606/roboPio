name: Release RobotLink ZIP

on:
  push:
    tags:
      - "lib/v*"   # z. B. lib/v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # für gh release create

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Version aus Tag extrahieren und library.properties aktualisieren
        id: version
        run: |
          # lib/v1.0.2 → 1.0.2
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#lib/v}"
          sed -i "s/^version=.*/version=$VERSION/" lib/RobotLink/library.properties
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ZIP=RobotLink-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: library.properties zurück ins Repo committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/RobotLink/library.properties
          git diff --cached --quiet || git commit -m "chore: bump library version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: ZIP bauen
        run: |
          cd lib
          find RobotLink -name ".DS_Store" -delete
          zip -r "../${{ steps.version.outputs.ZIP }}" RobotLink

      - name: GitHub Release anlegen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.version.outputs.ZIP }}" \
            --title "RobotLink ${{ steps.version.outputs.VERSION }}" \
            --notes "Arduino-Library als ZIP — Installation via \`Sketch → Include Library → Add .ZIP Library…\`"
