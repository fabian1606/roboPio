; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Aufteilung:
;   - Receiver (Roboter-Seite, Waveshare ESP32) → PIO, dieses Projekt.
;   - Sender (Controller-Seite) → Arduino IDE, distribuiert als ZIP der
;     RobotLink-Library. Die Sketches liegen unter
;     lib/RobotLink/examples/Sender{Direct,Cylindrical,Cartesian}/.
;
; Die Library selbst (lib/RobotLink/) ist Arduino-IDE-1.5-kompatibel und
; wird hier zugleich von PIO als lokale Lib genutzt.

[env:receiver]
; Waveshare "Servo Driver with ESP32" — standard ESP32 (not S3)
platform         = espressif32
board            = esp32dev
framework        = arduino
monitor_speed    = 115200
lib_deps =
    workloads/SCServo@^1.0.1
    fastled/FastLED@~3.9.0
    mattfryer/Smoothed@^1.2
build_src_filter = -<*> +<receiver/>
build_flags      =
    -D ROLE_RECEIVER
    -D ROBOTLINK_LED_PIN=23   ; WS2812B on Waveshare board → IO23
    -D ROBOTLINK_BTN_PIN=0    ; BOOT/KEY_FLASH button → GPIO0
upload_port      = /dev/cu.usbserial-0001
